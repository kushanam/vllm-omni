# Qwen2.5-Omni deploy laid out for tensor parallelism on the thinker.
#
# Requires >= 3 GPUs: the thinker is sharded across 2 (tensor_parallel_size=2 on
# GPU 0 and 1, set by the strategy); talker and code2wav share GPU 2.
#
# The thinker gets a TWO-GPU pool so a `tp: 2` strategy can shard one engine
# across both cards. Pair this with strategy_tp2.yaml:
#
#   python3 end2end.py --query-type text --num-prompts 6 \
#       --deploy-config deploy_qwen2_5_omni_tp2.yaml \
#       --strategy-config strategy_tp2.yaml
async_chunk: false

stages:
  - stage_id: 0
    max_num_batched_tokens: 32768
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    mm_processor_cache_gb: 0
    # Two-GPU pool: tp=2 shards one thinker engine across GPU 0 and GPU 1.
    devices: "0,1"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    max_num_batched_tokens: 32768
    max_num_seqs: 1
    gpu_memory_utilization: 0.8
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "2"
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_batched_tokens: 32768
    max_num_seqs: 1
    gpu_memory_utilization: 0.15
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    enable_flashinfer_autotune: false
    async_scheduling: false
    devices: "2"
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1
