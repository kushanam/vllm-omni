# BAGEL-7B-MoT single-stage deploy laid out for sequence parallelism (2-GPU box).
#
# The DiT stage gets a TWO-GPU pool so an `sp_ulysses: 2` strategy can shard the
# sequence across both cards. Pair this with strategy_sp_ulysses.yaml:
#
#   python3 end2end.py --modality text2img --seed 52 \
#       --deploy-config deploy_bagel_sp.yaml \
#       --strategy-config strategy_sp_ulysses.yaml
#
# The strategy sets ulysses_degree=2 (sequence_parallel_size=2) on the DiT stage;
# this deploy just supplies the matching 2-GPU device layout.

pipeline: bagel_single_stage
async_chunk: false

stages:
  - stage_id: 0
    max_num_batched_tokens: 32768
    max_num_seqs: 1
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0,1"
    default_sampling_params:
      seed: 52
